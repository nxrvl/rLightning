site_name: rLightning
site_url: https://rlightning.io/
site_author: Altista Tech
site_description: >-
  rLightning is a high-performance, Redis-compatible in-memory key-value store
  built in Rust, focused on session management and caching use cases.

repo_name: altista-tech/rLightning
repo_url: https://github.com/altista-tech/rLightning
copyright: Copyright &copy; 2024 Altista Tech

theme:
  name: material
  custom_dir: overrides
  favicon: favicon.svg
  language: en
  palette:
    # Light mode
    - scheme: default
      primary: deep orange
      accent: orange
      media: "(prefers-color-scheme: light)"
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: deep orange
      accent: orange
      media: "(prefers-color-scheme: dark)"
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - toc.follow
    - toc.integrate
    - search.suggest
    - search.highlight
    - search.share
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
  logo: icon.png
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang: en
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true

extra:
  generator: true
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/altista-tech/rLightning
      name: rLightning on GitHub
    - icon: fontawesome/brands/docker
      link: https://hub.docker.com/r/altista/rlightning
      name: rLightning on Docker Hub
    - icon: fontawesome/brands/rust
      link: https://crates.io/crates/rlightning
      name: rLightning on Crates.io
  version:
    provider: mike
    default: stable

markdown_extensions:
  - smarty
  - sane_lists
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - meta
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: altista-tech
      repo: rLightning
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.snippets

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started.md
    - Quick Start: quick-start.md
    - Docker Setup: docker.md
  - Commands:
    - Overview: commands/index.md
    - String Commands: commands/strings.md
    - Hash Commands: commands/hashes.md
    - List Commands: commands/lists.md
    - Set Commands: commands/sets.md
    - Sorted Set Commands: commands/sorted-sets.md
    - Pub/Sub Commands: commands/pubsub.md
    - Server Commands: commands/server.md
  - Configuration:
    - Overview: configuration.md
    - Memory Management: memory.md
    - Persistence: persistence.md
    - Replication: replication.md
    - Security: security.md
  - Architecture:
    - Overview: architecture.md
    - Storage Engine: storage-engine.md
    - Networking: networking.md
    - Command Processing: command-processing.md
  - Performance:
    - Benchmarks: benchmarks.md
    - Optimization Tips: optimization.md
  - Development:
    - Contributing: development.md
    - Testing: testing.md
    - Building: building.md
  - Use Cases: use-cases.md
  - FAQ: faq.md
