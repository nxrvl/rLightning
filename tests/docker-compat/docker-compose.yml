# Docker Compose for multi-language Redis compatibility testing
# Tests rLightning against real Redis 7 using Go, JavaScript, and Python clients
#
# Usage:
#   ./run-tests.sh                         # Full test suite
#   docker compose up -d redis rlightning  # Just start servers
#   docker compose down -v                 # Clean up

services:
  # Real Redis 7.x as the reference implementation
  redis:
    image: redis:7-alpine
    container_name: compat-test-redis
    ports:
      - "${REDIS_HOST_PORT:-6399}:6379"
    networks:
      - compat-test
    command: >
      redis-server
      --requirepass test_password
      --save ""
      --appendonly no
      --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "test_password", "--no-auth-warning", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 3s
    tmpfs:
      - /data

  # rLightning instance under test
  rlightning:
    build:
      context: ../../
      dockerfile: Dockerfile
    image: rlightning:compat-test
    container_name: compat-test-rlightning
    ports:
      - "${RLIGHTNING_HOST_PORT:-6400}:6379"
    networks:
      - compat-test
    command: ["rlightning", "--master-password", "test_password"]
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6379' 2>/dev/null"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 10s

  # Redis 7.x replica (replicaof the redis master)
  redis-replica:
    image: redis:7-alpine
    container_name: compat-test-redis-replica
    ports:
      - "${REDIS_REPLICA_HOST_PORT:-6401}:6379"
    networks:
      - compat-test
    command: >
      redis-server
      --requirepass test_password
      --masterauth test_password
      --replicaof redis 6379
      --save ""
      --appendonly no
      --loglevel warning
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "test_password", "--no-auth-warning", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s
    profiles:
      - replication

  # rLightning replica (replicaof the rlightning master)
  rlightning-replica:
    build:
      context: ../../
      dockerfile: Dockerfile
    image: rlightning:compat-test
    container_name: compat-test-rlightning-replica
    ports:
      - "${RLIGHTNING_REPLICA_HOST_PORT:-6402}:6379"
    networks:
      - compat-test
    command: ["rlightning", "--master-password", "test_password", "--master-host", "rlightning", "--master-port", "6379"]
    depends_on:
      rlightning:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6379' 2>/dev/null"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 10s
    profiles:
      - replication

  # Redis Cluster nodes (3 masters)
  redis-cluster-1:
    image: redis:7-alpine
    container_name: compat-test-redis-cluster-1
    ports:
      - "${REDIS_CLUSTER_PORT_1:-6403}:6379"
    networks:
      - compat-test
    command: >
      redis-server
      --requirepass test_password
      --masterauth test_password
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --cluster-announce-hostname redis-cluster-1
      --save ""
      --appendonly no
      --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "test_password", "--no-auth-warning", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 3s
    profiles:
      - cluster
    tmpfs:
      - /data

  redis-cluster-2:
    image: redis:7-alpine
    container_name: compat-test-redis-cluster-2
    ports:
      - "${REDIS_CLUSTER_PORT_2:-6404}:6379"
    networks:
      - compat-test
    command: >
      redis-server
      --requirepass test_password
      --masterauth test_password
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --cluster-announce-hostname redis-cluster-2
      --save ""
      --appendonly no
      --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "test_password", "--no-auth-warning", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 3s
    profiles:
      - cluster
    tmpfs:
      - /data

  redis-cluster-3:
    image: redis:7-alpine
    container_name: compat-test-redis-cluster-3
    ports:
      - "${REDIS_CLUSTER_PORT_3:-6405}:6379"
    networks:
      - compat-test
    command: >
      redis-server
      --requirepass test_password
      --masterauth test_password
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --cluster-announce-hostname redis-cluster-3
      --save ""
      --appendonly no
      --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "test_password", "--no-auth-warning", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 3s
    profiles:
      - cluster
    tmpfs:
      - /data

  # rLightning Cluster nodes (3 masters)
  rlightning-cluster-1:
    build:
      context: ../../
      dockerfile: Dockerfile
    image: rlightning:compat-test
    container_name: compat-test-rlightning-cluster-1
    ports:
      - "${RLIGHTNING_CLUSTER_PORT_1:-6406}:6379"
    networks:
      - compat-test
    volumes:
      - ./config/rlightning-cluster-1.toml:/etc/rlightning/config.toml:ro
    command: ["rlightning", "--config", "/etc/rlightning/config.toml"]
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6379' 2>/dev/null"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 10s
    profiles:
      - cluster

  rlightning-cluster-2:
    build:
      context: ../../
      dockerfile: Dockerfile
    image: rlightning:compat-test
    container_name: compat-test-rlightning-cluster-2
    ports:
      - "${RLIGHTNING_CLUSTER_PORT_2:-6407}:6379"
    networks:
      - compat-test
    volumes:
      - ./config/rlightning-cluster-2.toml:/etc/rlightning/config.toml:ro
    command: ["rlightning", "--config", "/etc/rlightning/config.toml"]
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6379' 2>/dev/null"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 10s
    profiles:
      - cluster

  rlightning-cluster-3:
    build:
      context: ../../
      dockerfile: Dockerfile
    image: rlightning:compat-test
    container_name: compat-test-rlightning-cluster-3
    ports:
      - "${RLIGHTNING_CLUSTER_PORT_3:-6408}:6379"
    networks:
      - compat-test
    volumes:
      - ./config/rlightning-cluster-3.toml:/etc/rlightning/config.toml:ro
    command: ["rlightning", "--config", "/etc/rlightning/config.toml"]
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6379' 2>/dev/null"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 10s
    profiles:
      - cluster

  # Go test client (go-redis/redis v9)
  go-client:
    build:
      context: ./go-client
    container_name: compat-test-go
    networks:
      - compat-test
    environment:
      REDIS_HOST: ${TARGET_HOST:-redis}
      REDIS_PORT: "6379"
      REDIS_PASSWORD: test_password
      TEST_PREFIX: "gotest:"
    profiles:
      - go-client
      - clients

  # JavaScript test client (ioredis)
  js-client:
    build:
      context: ./js-client
    container_name: compat-test-js
    networks:
      - compat-test
    environment:
      REDIS_HOST: ${TARGET_HOST:-redis}
      REDIS_PORT: "6379"
      REDIS_PASSWORD: test_password
      TEST_PREFIX: "jstest:"
    profiles:
      - js-client
      - clients

  # Python test client (redis-py)
  python-client:
    build:
      context: ./python-client
    container_name: compat-test-python
    networks:
      - compat-test
    environment:
      REDIS_HOST: ${TARGET_HOST:-redis}
      REDIS_PORT: "6379"
      REDIS_PASSWORD: test_password
      TEST_PREFIX: "pytest:"
    profiles:
      - python-client
      - clients

networks:
  compat-test:
    driver: bridge
