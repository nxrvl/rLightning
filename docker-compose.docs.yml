version: '3.8'

services:
  # Documentation site
  docs:
    build:
      context: .
      dockerfile: Dockerfile.site
    container_name: rlightning-docs
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "com.rlightning.description=rLightning documentation site"
      - "com.rlightning.service=docs"

  # Optional: MkDocs development server with live reload
  docs-dev:
    image: squidfunk/mkdocs-material:latest
    container_name: rlightning-docs-dev
    ports:
      - "8000:8000"
    volumes:
      - ./site:/docs
    command: serve --dev-addr=0.0.0.0:8000
    profiles:
      - dev
    labels:
      - "com.rlightning.description=rLightning docs development server"
      - "com.rlightning.service=docs-dev"
