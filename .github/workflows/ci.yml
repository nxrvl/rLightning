name: CI Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'site/**'
      - '.github/workflows/docs.yml'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'site/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "ci-tests"
          cache-on-failure: true

      - name: Run all tests
        run: |
          cargo test --all-features

      - name: Test summary
        if: always()
        run: |
          echo "::notice::Test execution completed"

  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - name: Notify success (push)
        if: needs.test.result == 'success' && github.event_name == 'push'
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ✅ **Tests Passed**

            **Repository:** ${{ github.repository }}
            **Branch:** ${{ github.ref_name }}
            **Commit:** `${{ github.sha }}`

            All tests passed successfully!

            [View Details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Notify failure (push)
        if: needs.test.result == 'failure' && github.event_name == 'push'
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ❌ **Tests Failed**

            **Repository:** ${{ github.repository }}
            **Branch:** ${{ github.ref_name }}
            **Commit:** `${{ github.sha }}`

            [View Details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

      - name: Notify success (PR)
        if: needs.test.result == 'success' && github.event_name == 'pull_request'
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ✅ **Tests Passed - PR #${{ github.event.pull_request.number }}**

            **Repository:** ${{ github.repository }}
            **Branch:** ${{ github.head_ref }}
            **Author:** ${{ github.event.pull_request.user.login }}
            **Commit:** `${{ github.event.pull_request.head.sha }}`

            All tests passed successfully!

            [View PR](${{ github.event.pull_request.html_url }})

      - name: Notify failure (PR)
        if: needs.test.result == 'failure' && github.event_name == 'pull_request'
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ❌ **Tests Failed - PR #${{ github.event.pull_request.number }}**

            **Repository:** ${{ github.repository }}
            **Branch:** ${{ github.head_ref }}
            **Author:** ${{ github.event.pull_request.user.login }}
            **Commit:** `${{ github.event.pull_request.head.sha }}`

            [View Details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
