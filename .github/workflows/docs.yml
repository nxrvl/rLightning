name: Deploy Documentation

on:
  workflow_dispatch:

env:
  DEPLOY_HOST: mpanin.me
  DEPLOY_USER: root
  DEPLOY_PATH: /opt/rlightning.mpanin.me

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: cd site && npm ci

      - name: Build site
        run: cd site && npm run build

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "mpanin.me ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIJtQ4Hz722NP7vj8kF37Q3tv+myrxuGV8dgVUhY4B+L4" >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config << EOF
          Host mpanin.me
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking yes
          EOF

      - name: Deploy to server
        run: |
          rsync -avz --delete site/dist/ ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}:${{ env.DEPLOY_PATH }}/dist/
          ssh ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} "cd ${{ env.DEPLOY_PATH }} && docker compose up --build -d"
