name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'

env:
  REGISTRY: docker.io
  IMAGE_NAME: nxrvl/rlightning

jobs:
  # Job 1: Run tests
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release-tests"

      - name: Run all tests
        run: cargo test --all-features

  notify-test-failure:
    needs: test
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Notify test failure
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ❌ **Release Tests Failed - ${{ github.ref_name }}**

            **Repository:** ${{ github.repository }}
            **Version:** ${{ github.ref_name }}
            **Commit:** `${{ github.sha }}`

            Tests failed. Release build aborted.

            [View Details](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

  # Job 2: Cross-compile binaries for all platforms (native speed, no QEMU)
  build-binaries:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            platform_tag: amd64
            cross_packages: ""
            linker: ""
            cc: ""
          - target: aarch64-unknown-linux-gnu
            platform_tag: arm64
            cross_packages: "gcc-aarch64-linux-gnu libc6-dev-arm64-cross"
            linker: "aarch64-linux-gnu-gcc"
            cc: "aarch64-linux-gnu-gcc"
          - target: armv7-unknown-linux-gnueabihf
            platform_tag: armv7
            cross_packages: "gcc-arm-linux-gnueabihf libc6-dev-armhf-cross"
            linker: "arm-linux-gnueabihf-gcc"
            cc: "arm-linux-gnueabihf-gcc"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Notify build start
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            🔨 **Building ${{ matrix.platform_tag }}** - ${{ github.ref_name }}

            Target: `${{ matrix.target }}`
            Mode: ${{ matrix.cross_packages && 'cross-compilation' || 'native' }}

      - name: Install cross-compilation toolchain
        if: matrix.cross_packages != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ${{ matrix.cross_packages }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release-${{ matrix.platform_tag }}"
          cache-on-failure: true

      - name: Build release binary
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.linker || '' }}
          CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER: ${{ matrix.linker || '' }}
          CC: ${{ matrix.cc || 'gcc' }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.platform_tag }}
          path: target/${{ matrix.target }}/release/rlightning
          if-no-files-found: error
          retention-days: 1

      - name: Notify build complete
        if: success()
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ✅ **${{ matrix.platform_tag }} binary built** - ${{ github.ref_name }}

      - name: Notify build failure
        if: failure()
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ❌ **${{ matrix.platform_tag }} Build Failed** - ${{ github.ref_name }}

            [View Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

  # Job 3: Build Docker images from pre-built binaries (fast — no Rust compilation in Docker)
  build-images:
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            platform_tag: amd64
          - platform: linux/arm64
            platform_tag: arm64
          - platform: linux/arm/v7
            platform_tag: armv7

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: binary-${{ matrix.platform_tag }}
          path: docker-context/

      - name: Prepare Docker context
        run: chmod +x docker-context/rlightning

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}-${{ matrix.platform_tag }}
            type=semver,pattern={{major}}.{{minor}}-${{ matrix.platform_tag }}

      - name: Build and push platform image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: docker-context/
          file: ./Dockerfile.release
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.platform_tag }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Job 4: Create multi-arch manifest
  create-manifest:
    needs: build-images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}

      - name: Notify manifest complete
        if: success()
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ✅ **Multi-Arch Manifest Created** - ${{ github.ref_name }}

            **Tags pushed:**
            • `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}`
            • `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest`

            Creating GitHub release...

      - name: Notify manifest failure
        if: failure()
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ❌ **Manifest Creation Failed** - ${{ github.ref_name }}

            [View Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

  # Job 5: Create GitHub release
  create-release:
    needs: create-manifest
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
          body: |
            ## Docker Images

            Multi-platform Docker images are available:
            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ```

            Supported platforms:
            - linux/amd64
            - linux/arm64
            - linux/arm/v7

            ## What's Changed
            See the full changelog below.

      - name: Notify release success
        if: success()
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            🎉 **Release Published - ${{ github.ref_name }}**

            **Repository:** ${{ github.repository }}
            **Version:** ${{ github.ref_name }}

            **Docker Images Available:**
            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ```

            **Supported Platforms:**
            • linux/amd64
            • linux/arm64
            • linux/arm/v7

            [Release Notes](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }})
            [Docker Hub](https://hub.docker.com/r/${{ env.IMAGE_NAME }})

      - name: Notify release failure
        if: failure()
        uses: appleboy/telegram-action@v1.0.0
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          message: |
            ❌ **GitHub Release Failed** - ${{ github.ref_name }}

            Docker images are available but GitHub release creation failed.

            [View Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
